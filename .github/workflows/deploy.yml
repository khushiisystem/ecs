name: CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  AWS_REGION: ap-southeast-1
  FRONTEND_ECR: my-app-frontend
  BACKEND_ECR: my-app-backend
  ECS_CLUSTER: my-app-cluster

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: ./terraform

      - name: Terraform Destroy
        run: terraform  destroy -auto-approve
        working-directory: ./terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: ./terraform

  build-and-deploy-frontend:
    name: Frontend Build & Deploy
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build & Push Frontend Image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.FRONTEND_ECR }}:latest
          docker build \
            --build-arg VITE_API_BASE_URL=http://13.214.127.52:8000 \
            --build-arg VITE_APP_ENV=production \
            -t $IMAGE_URI \
            -f frontend/FE-Portal/Dockerfile frontend/FE-Portal
          docker push $IMAGE_URI

      - name: Deploy Frontend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service frontend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

  build-and-deploy-backend:
    name: Backend Build & Deploy
    runs-on: ubuntu-latest
    needs: terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          submodules: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build & Push Backend Image
        run: |
          IMAGE_URI=${{ steps.login-ecr.outputs.registry }}/${{ env.BACKEND_ECR }}:latest
          docker build -t $IMAGE_URI -f backend/TranningAndCertification/Dockerfile backend/TranningAndCertification
          docker push $IMAGE_URI

      - name: Deploy Backend to ECS
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service backend-service \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}
